<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zuma Luxury Mobile</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%230a0a0a%22 stroke=%22%23d4af37%22 stroke-width=%225%22/><circle cx=%2250%22 cy=%2250%22 r=%2220%22 fill=%22%23d4af37%22/><path d=%22M50 10 L60 40 L90 50 L60 60 L50 90 L40 60 L10 50 L40 40 Z%22 fill=%22gold%22/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a0a0a%22/><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22none%22 stroke=%22%23d4af37%22 stroke-width=%228%22/><circle cx=%2250%22 cy=%2250%22 r=%2215%22 fill=%22%23d4af37%22/></svg>">

    <style>
        :root {
            --bg-dark: #050505;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #game-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        canvas {
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            touch-action: none; max-width: 100%; max-height: 100%;
        }

        #ui-overlay {
            position: absolute; top: env(safe-area-inset-top, 20px);
            width: 90%; display: flex; justify-content: space-between;
            pointer-events: none; z-index: 10;
        }

        .stat-box {
            background: var(--glass); padding: 8px 15px;
            border-radius: 15px; border: 1px solid var(--gold);
            backdrop-filter: blur(5px); color: var(--gold);
            font-weight: bold; letter-spacing: 1px;
        }

        #game-over {
            position: absolute; display: none;
            flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.9); width: 100%; height: 100%;
            justify-content: center; z-index: 20;
        }

        .btn-restart {
            margin-top: 20px; padding: 15px 40px;
            background: var(--gold); border: none; border-radius: 30px;
            color: black; font-weight: bold; font-size: 1.2rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui-overlay">
        <div class="stat-box" id="score-val">SCORE: 0</div>
        <div class="stat-box">ZUMA PRO</div>
    </div>

    <div id="game-over">
        <h1 style="color: var(--gold); font-size: 3rem;">GAME OVER</h1>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <button class="btn-restart" onclick="resetGame()">CHƠI LẠI</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let width, height, centerX, centerY, orbitRadius;
    let score = 0;
    let balls = [], bullets = [], particles = [];
    const colors = ['#FF3B30', '#4CD964', '#007AFF', '#FFCC00', '#AF52DE'];
    let nextBulletColor = colors[Math.floor(Math.random() * colors.length)];
    let spawnTimer = 0;
    let isGameOver = false;

    // --- ÂM THANH (Dạng sóng điện tử) ---
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'shoot') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        } else if (type === 'pop') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        centerX = width / 2;
        centerY = height / 2;
        orbitRadius = Math.min(width, height) * 0.4;
    }

    class Ball {
        constructor(angle, color) {
            this.angle = angle; this.color = color; this.radius = orbitRadius * 0.07;
        }
        draw() {
            const x = centerX + Math.cos(this.angle) * orbitRadius;
            const y = centerY + Math.sin(this.angle) * orbitRadius;
            ctx.beginPath();
            ctx.arc(x, y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10; ctx.shadowColor = this.color;
            ctx.fill();
            ctx.shadowBlur = 0;
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.arc(x - 3, y - 3, this.radius/2, 0, Math.PI*2); ctx.fill();
            ctx.closePath();
        }
    }

    class Bullet {
        constructor(targetX, targetY, color) {
            this.x = centerX; this.y = centerY;
            const angle = Math.atan2(targetY - centerY, targetX - centerX);
            this.speed = 12;
            this.vx = Math.cos(angle) * this.speed;
            this.vy = Math.sin(angle) * this.speed;
            this.color = color; this.radius = orbitRadius * 0.06;
        }
        update() { this.x += this.vx; this.y += this.vy; }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill(); ctx.closePath();
        }
    }

    function spawnBall() {
        if (spawnTimer <= 0) {
            balls.push(new Ball(-Math.PI/2, colors[Math.floor(Math.random() * colors.length)]));
            spawnTimer = 35;
        }
        spawnTimer--;
    }

    function update() {
        if (isGameOver) return;
        spawnBall();

        balls.forEach((ball, i) => {
            ball.angle += 0.008;
            if (ball.angle >= 1.5 * Math.PI) {
                isGameOver = true;
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('final-score').innerText = "SCORE: " + score;
            }
        });

        bullets.forEach((bullet, bIdx) => {
            bullet.update();
            balls.forEach((ball, aIdx) => {
                const bx = centerX + Math.cos(ball.angle) * orbitRadius;
                const by = centerY + Math.sin(ball.angle) * orbitRadius;
                if (Math.hypot(bullet.x - bx, bullet.y - by) < bullet.radius + ball.radius) {
                    if (bullet.color === ball.color) {
                        balls.splice(aIdx, 1);
                        score += 10;
                        document.getElementById('score-val').innerText = "SCORE: " + score;
                        playSound('pop');
                        // Rung màn hình nhẹ
                        canvas.style.transform = `translate(${Math.random()*5}px, ${Math.random()*5}px)`;
                        setTimeout(() => canvas.style.transform = 'none', 50);
                    }
                    bullets.splice(bIdx, 1);
                }
            });
        });
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);

        // Đường ray Luxury
        ctx.beginPath();
        ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
        ctx.strokeStyle = '#111'; ctx.lineWidth = orbitRadius * 0.15; ctx.stroke();
        ctx.strokeStyle = varColor('--gold'); ctx.lineWidth = 2; ctx.stroke();
        ctx.closePath();

        // Shooter (Zuma Frog)
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.fillStyle = nextBulletColor;
        ctx.beginPath(); ctx.arc(0, 0, orbitRadius * 0.1, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.stroke();
        ctx.restore();

        balls.forEach(b => b.draw());
        bullets.forEach(b => b.draw());
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    function gameLoop() {
        update(); draw(); requestAnimationFrame(gameLoop);
    }

    function handleAction(e) {
        if (isGameOver) return;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        bullets.push(new Bullet(x, y, nextBulletColor));
        nextBulletColor = colors[Math.floor(Math.random() * colors.length)];
        playSound('shoot');
    }

    function resetGame() {
        balls = []; bullets = []; score = 0; isGameOver = false;
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('score-val').innerText = "SCORE: 0";
    }

    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', (e) => { handleAction(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('resize', resize);
    
    window.onload = () => { resize(); gameLoop(); };
</script>

</body>
</html>
