<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zuma Pro - Phiên Bản Cao Cấp</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%231a1a1a%22 stroke=%22%23d4af37%22 stroke-width=%224%22/><path d=%22M30 40 Q50 10 70 40 L80 80 Q50 95 20 80 Z%22 fill=%22%232e7d32%22/></svg>">

    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .hud { position: absolute; top: env(safe-area-inset-top, 15px); width: 90%; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; }
        .stat { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 20px; color: var(--gold); font-weight: bold; backdrop-filter: blur(5px); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { background: linear-gradient(135deg, #d4af37, #aa8a2e); color: black; border: none; padding: 15px 45px; font-size: 1.4rem; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.9); }
        #combo-ui { position: absolute; pointer-events: none; color: var(--gold); font-size: 2rem; font-weight: 900; text-shadow: 0 0 10px orange; display: none; z-index: 6; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="combo-ui">COMBO X2</div>
    <div class="hud">
        <div class="stat" id="score-text">ĐIỂM: 0</div>
        <div class="stat" id="level-text">ZUMA PRO</div>
    </div>

    <div id="overlay">
        <h1 style="color: var(--gold); font-size: 3rem; margin: 0;">KẾT THÚC!</h1>
        <p id="final-score" style="font-size: 1.5rem; margin: 20px 0;"></p>
        <button class="btn" onclick="resetGame()">CHƠI LẠI</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const comboUI = document.getElementById('combo-ui');

    let width, height, centerX, centerY, orbitRadius;
    let score = 0, combo = 0, comboTimer = 0;
    let balls = [], bullets = [], particles = [];
    let frogAngle = 0, isGameOver = false, spawnTimer = 0, freezeTimer = 0;
    
    const colors = ['#ff4d4d', '#4dff88', '#4da6ff', '#ffff4d', '#d4af37'];
    let currentBulletColor = colors[Math.floor(Math.random() * colors.length)];

    function playSound(freq, type, duration = 0.2) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(type === 'square') osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 12; i++) {
            particles.push({
                x, y, color,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                size: Math.random() * 5 + 2
            });
        }
    }

    function resize() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        centerX = width / 2; centerY = height / 2;
        orbitRadius = Math.min(width, height) * 0.42;
    }

    class Ball {
        constructor(angle, color) {
            this.angle = angle; this.color = color; 
            this.radius = orbitRadius * 0.07;
            this.isSpecial = Math.random() > 0.9; // 10% cơ hội là bi đặc biệt
        }
        draw() {
            const x = centerX + Math.cos(this.angle) * orbitRadius;
            const y = centerY + Math.sin(this.angle) * orbitRadius;
            ctx.beginPath();
            ctx.arc(x, y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.fill();
            if(this.isSpecial) {
                ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }
    }

    class Bullet {
        constructor(angle, color) {
            this.x = centerX; this.y = centerY;
            this.vx = Math.cos(angle) * 18;
            this.vy = Math.sin(angle) * 18;
            this.color = color; this.radius = orbitRadius * 0.06;
        }
        update() { this.x += this.vx; this.y += this.vy; }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
        }
    }

    function update() {
        if (isGameOver) return;

        // Xử lý đóng băng
        if (freezeTimer > 0) freezeTimer--;

        if (spawnTimer-- <= 0 && freezeTimer <= 0) {
            balls.push(new Ball(-Math.PI / 2, colors[Math.floor(Math.random() * colors.length)]));
            spawnTimer = 45;
        }

        // Cập nhật chuỗi bóng
        balls.forEach((ball, index) => {
            if (freezeTimer <= 0) ball.angle += 0.008;
            if (ball.angle >= 1.5 * Math.PI) {
                isGameOver = true;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('final-score').innerText = "TỔNG ĐIỂM: " + score;
            }
        });

        // Va chạm đạn
        bullets.forEach((bullet, bIdx) => {
            bullet.update();
            balls.forEach((ball, aIdx) => {
                const bx = centerX + Math.cos(ball.angle) * orbitRadius;
                const by = centerY + Math.sin(ball.angle) * orbitRadius;
                if (Math.hypot(bullet.x - bx, bullet.y - by) < bullet.radius + ball.radius) {
                    if (bullet.color === ball.color) {
                        createExplosion(bx, by, ball.color);
                        if(ball.isSpecial) { 
                            freezeTimer = 120; // Đóng băng 2 giây
                            playSound(800, 'sine', 0.5);
                        }
                        balls.splice(aIdx, 1);
                        combo++; comboTimer = 60;
                        score += 10 * combo;
                        document.getElementById('score-text').innerText = "ĐIỂM: " + score;
                        playSound(400 + (combo * 100), 'sine');
                        showCombo();
                    } else {
                        combo = 0; // Bắn sai màu mất combo
                    }
                    bullets.splice(bIdx, 1);
                }
            });
        });

        // Hạt hiệu ứng
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
        });

        if (comboTimer > 0) comboTimer--; else combo = 0;
    }

    function showCombo() {
        if (combo > 1) {
            comboUI.style.display = 'block';
            comboUI.innerText = "COMBO X" + combo;
            setTimeout(() => comboUI.style.display = 'none', 500);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        // Vẽ Ray (Đường chạy)
        ctx.beginPath();
        ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
        ctx.strokeStyle = freezeTimer > 0 ? '#4da6ff' : '#111';
        ctx.lineWidth = orbitRadius * 0.18; ctx.stroke();

        // Con Ếch
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(frogAngle + Math.PI / 2);
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath(); ctx.ellipse(0, 0, 35, 40, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(-15, -30, 8, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(15, -30, 8, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = currentBulletColor;
        ctx.beginPath(); ctx.arc(0, -28, 12, 0, 2*Math.PI); ctx.fill();
        ctx.restore();

        balls.forEach(b => b.draw());
        bullets.forEach(b => b.draw());
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            ctx.globalAlpha = 1;
        });
    }

    function resetGame() {
        balls = []; bullets = []; particles = []; score = 0; combo = 0;
        isGameOver = false; freezeTimer = 0;
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('score-text').innerText = "ĐIỂM: 0";
    }

    function handleInput(e) {
        if (isGameOver) return;
        const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0));
        const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0));
        frogAngle = Math.atan2(y - centerY, x - centerX);
        if (e.type === 'mousedown' || e.type === 'touchstart') {
            bullets.push(new Bullet(frogAngle, currentBulletColor));
            currentBulletColor = colors[Math.floor(Math.random() * colors.length)];
            playSound(200, 'square', 0.1);
        }
    }

    window.addEventListener('mousemove', handleInput);
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('resize', resize);
    window.onload = () => { resize(); setInterval(() => { update(); draw(); }, 16); };
</script>
</body>
</html>
